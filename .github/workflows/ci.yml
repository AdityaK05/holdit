name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + type-check ─────────────────────────────────────────────
  lint-backend:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff (linter)
        run: pip install ruff && ruff check app/ main.py

      - name: Run mypy (type checker)
        run: pip install mypy && mypy app/ main.py --ignore-missing-imports --no-strict-optional

  # ── Frontend: lint + type-check ────────────────────────────────────────────
  lint-frontend:
    name: Frontend — Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (ESLint via next lint)
        run: npx next lint --max-warnings 0
        continue-on-error: true   # Remove when lint is clean

  # ── Docker build smoke test ────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t holdit-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t holdit-frontend:ci
